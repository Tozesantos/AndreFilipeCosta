    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, var(--brown2), var(--brown1));
    }

    .card {
      text-align: center;
      color: white;
    }

    /* AVATAR */
    .avatar-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 20px;
      
      /* Adiciona estas 3 linhas para centrar a foto: */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ANEL DOURADO A GIRAR */
    .rotating-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 150px;
      transform: translate(-50%, -50%);
      border-radius: 50%;

      background: conic-gradient(
        var(--gold1),
        var(--gold2),
        var(--gold1),
        var(--gold2),
        var(--gold1)
      );

      animation: spin 6s linear infinite;
      filter: blur(1px);
      box-shadow: 0 0 20px rgba(255,215,120,0.6);
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* IMAGEM */
    .avatar {
      position: relative;
      z-index: 2;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #2b0d05;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* TEXTO */
    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      color: var(--gold1);
      margin-bottom: 10px;
      text-transform: lowercase;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #f3d38a;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    /* BOTÃO */
    .cta-btn {
      display: inline-block;
      padding: 14px 40px;
      border-radius: 14px;
      background: linear-gradient(145deg, var(--botao1), var(--botao2));
      color: white;
      text-decoration: none;
      font-weight: 500;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
